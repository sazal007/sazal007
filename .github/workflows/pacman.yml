name: generate arcade contribution graphs

on:
  schedule:
    - cron: '0 */12 * * *'

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  pacman:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Pacman Graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: 'pacman'

      - name: Deploy Pacman
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist

  galaga:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    needs: pacman

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Galaga Graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: 'galaga'

      - name: Deploy Galaga
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
