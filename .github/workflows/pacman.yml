name: generate arcade contribution graphs

on:
  schedule:
    - cron: '0 0 * * *'   # once daily is enough; every 12h is overkill
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Generate Pac-Man graph → writes to ./dist
      - name: Generate Pac-Man graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: 'pacman'

      # Stash Pac-Man output before next action overwrites dist/
      - name: Stash Pac-Man files
        run: cp -r dist dist-pacman

      # Generate Galaga graph → overwrites ./dist
      - name: Generate Galaga graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: 'galaga'

      # Merge both outputs into dist/
      - name: Merge outputs
        run: cp -r dist-pacman/* dist/

      # Deploy using the action the upstream repo actually uses
      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
